server:
  port: 8086
spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: order-service
              uri: http://localhost:8085
              predicates:
                - Path=/api/v1/orders,/api/v1/orders/**

            - id: product-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/v1/products,/api/v1/products/**,/api/v1/categories,/api/v1/categories/**

            - id: inventory-service
              uri: http://localhost:8084
              predicates:
                - Path=/api/v1/inventory/**

            - id: auth-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/v1/auth,/api/v1/auth/**

logging:
  level:
    org.springframework.cloud.gateway: debug
    org.springframework.security: debug
jwt:
  secret: 8f5c2d9a1b7e4f6c8d0a3b5e7f9c1d2a8f4b6e0c3a5d7f9b1c2e4a6d8f0b3c5

